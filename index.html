---
layout: default
---

{% for post in site.posts %}
  <article class="feed-item">
    <time class="feed-date" datetime="{{ post.date | date_to_xmlschema }}">
      {{ post.date | date: "%B %d, %Y" }}
    </time>
    <div class="feed-content">
      {{ post.content }}
    </div>
  </article>
{% endfor %}
