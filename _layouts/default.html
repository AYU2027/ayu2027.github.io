<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #f3f4f6;
            --bg-3: #f8fafc;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --card-bg: rgba(255, 255, 255, 0.85);
            --accent: #2563eb; 
            --accent-glow: #3b82f6;
        }

        html {
            scroll-behavior: smooth;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-1));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            line-height: 1.7;
            margin: 0;
            padding: 0;
        }

        /* TIMELINE SIDEBAR */
        .timeline-sidebar {
            position: fixed;
            top: 50%;
            left: 24px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .timeline-sidebar a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }

        .timeline-sidebar a:hover {
            color: var(--accent);
        }
        
        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        header {
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }
        
        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 8px 0;
        }
        
        header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 1.15rem;
        }

        .feed-item {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 28px;
        }

        .feed-date {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

    <!-- TIMELINE SIDEBAR -->
    <div class="timeline-sidebar">
        <a href="#section1">Intro</a>
        <a href="#section2">Journey</a>
        <a href="#section3">Projects</a>
        <a href="#section4">Achievements</a>
    </div>

    <div class="container">
        <header>
            <h1>{{ site.title }}</h1>
            <p>{{ site.description }}</p>
        </header>
        
        <main>
            <div id="section1" class="feed-item">
                <span class="feed-date">Intro</span>
                <p>Content here</p>
            </div>

            <div id="section2" class="feed-item">
                <span class="feed-date">Journey</span>
                <p>Content here</p>
            </div>

            <div id="section3" class="feed-item">
                <span class="feed-date">Projects</span>
                <p>Content here</p>
            </div>

            <div id="section4" class="feed-item">
                <span class="feed-date">Achievements</span>
                <p>Content here</p>
            </div>
        </main>
        
        <footer>
            &copy; 2026 Ayush Sinha.
        </footer>
    </div>

</body>
</html>
