<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <style>
        :root {
            --bg: #fafafa;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --card-bg: #ffffff;
            --accent: #2563eb; 
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.7;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        
        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        /* --- KEYFRAME ANIMATIONS --- */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Header fades in and slides down */
        header {
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            animation: fadeDown 0.8s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }
        
        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: -0.03em;
        }
        
        header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 1.15rem;
        }

        /* The main feed waits 0.1s, then slides up smoothly */
        main {
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
            animation-delay: 0.1s;
        }
        
        /* --- ADVANCED CARD ANIMATIONS --- */
        .feed-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 28px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
            /* Ultra-smooth transition for hover effects */
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* The blue accent line that grows on hover */
        .feed-item::before {
            content: "";
            position: absolute;
            top: 0; left: 0; bottom: 0; width: 4px;
            background: var(--accent);
            transform: scaleY(0);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            transform-origin: bottom;
        }

        /* What happens when you hover over a post */
        .feed-item:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-color: #d1d5db;
        }

        .feed-item:hover::before {
            transform: scaleY(1);
        }
        
        .feed-date {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 16px;
            display: block;
        }
        
        .feed-content p {
            margin: 0 0 16px 0;
            font-size: 1.05rem;
        }
        
        .feed-content p:last-child {
            margin-bottom: 0;
        }
        
        footer {
            margin-top: 4rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            opacity: 0;
            animation: slideUp 0.8s ease forwards;
            animation-delay: 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>{{ site.title }}</h1>
            <p>{{ site.description }}</p>
        </header>
        
        <main>
            {{ content }}
        </main>
        
        <footer>
            &copy; 2026 Ayush Sinha.
        </footer>
    </div>
</body>
</html>
